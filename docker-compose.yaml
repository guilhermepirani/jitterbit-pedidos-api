services:
  postgres-dev:
    container_name: 'postgres-dev'
    image: postgres:alpine
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
      POSTGRES_DB: '${DB_NAME}'
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
